name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Build WASM package
        working-directory: frontend
        run: npm run wasm:build
      - name: Verify Rust changes include refreshed WASM delivery artifacts
        shell: bash
        run: |
          if git diff --quiet HEAD^ HEAD -- Cargo.lock crates/inkform-core crates/inkform-wasm; then
            exit 0
          fi

          git diff --quiet HEAD^ HEAD -- frontend/public/wasm/inkform_wasm_bg.wasm frontend/src/lib/generated || exit 0
          echo "Rust or WASM source changed without refreshing the committed browser delivery artifacts."
          exit 1
      - name: Type-check frontend
        working-directory: frontend
        run: npm run typecheck
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  native-font-validation:
    name: Native font validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate validation font
        shell: bash
        run: cargo run -p inkform-core --example write_validation_font -- "$RUNNER_TEMP/inkform-validation.ttf"
      - name: Validate with FreeType
        if: runner.os == 'Linux'
        shell: bash
        run: fc-scan "$RUNNER_TEMP/inkform-validation.ttf"
      - name: Validate with CoreText
        if: runner.os == 'macOS'
        shell: bash
        env:
          FONT_PATH: ${{ runner.temp }}/inkform-validation.ttf
        run: |
          swift -framework CoreText -framework Foundation - <<'SWIFT'
          import CoreText
          import Foundation

          let path = ProcessInfo.processInfo.environment["FONT_PATH"] ?? ""
          let url = URL(fileURLWithPath: path)
          var registrationError: Unmanaged<CFError>?

          guard CTFontManagerRegisterFontsForURL(url as CFURL, .process, &registrationError) else {
              let message = registrationError?.takeRetainedValue().localizedDescription ?? "Unknown CoreText error"
              fatalError("CoreText rejected generated font: \(message)")
          }

          guard CTFontManagerUnregisterFontsForURL(url as CFURL, .process, nil) else {
              fatalError("CoreText could not unregister generated font")
          }
          SWIFT
      - name: Validate with GDI
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          FONT_PATH: ${{ runner.temp }}\inkform-validation.ttf
        run: |
          Add-Type @'
          using System;
          using System.Text;
          using System.Runtime.InteropServices;

          public static class InkformFontValidator {
              [StructLayout(LayoutKind.Sequential)]
              public struct GlyphMetrics {
                  public uint BlackBoxX;
                  public uint BlackBoxY;
                  public int OriginX;
                  public int OriginY;
                  public short CellIncrementX;
                  public short CellIncrementY;
              }

              [DllImport("gdi32.dll", CharSet = CharSet.Unicode, SetLastError = true)]
              public static extern int AddFontResourceEx(string fileName, uint flags, IntPtr reserved);

              [DllImport("gdi32.dll", CharSet = CharSet.Unicode, SetLastError = true)]
              public static extern bool RemoveFontResourceEx(string fileName, uint flags, IntPtr reserved);

              [DllImport("gdi32.dll", SetLastError = true)]
              public static extern IntPtr CreateCompatibleDC(IntPtr deviceContext);

              [DllImport("gdi32.dll", SetLastError = true)]
              public static extern bool DeleteDC(IntPtr deviceContext);

              [DllImport("gdi32.dll", CharSet = CharSet.Unicode, SetLastError = true)]
              public static extern IntPtr CreateFontW(
                  int height, int width, int escapement, int orientation, int weight,
                  uint italic, uint underline, uint strikeOut, uint characterSet,
                  uint outputPrecision, uint clipPrecision, uint quality,
                  uint pitchAndFamily, string faceName);

              [DllImport("gdi32.dll", SetLastError = true)]
              public static extern IntPtr SelectObject(IntPtr deviceContext, IntPtr graphicObject);

              [DllImport("gdi32.dll", SetLastError = true)]
              public static extern bool DeleteObject(IntPtr graphicObject);

              [DllImport("gdi32.dll", SetLastError = true)]
              public static extern uint GetGlyphOutlineW(
                  IntPtr deviceContext, uint character, uint format, out GlyphMetrics metrics,
                  uint bufferSize, IntPtr buffer, IntPtr matrix);
          }
          '@

          $flags = [uint32]0x10
          $count = [InkformFontValidator]::AddFontResourceEx($env:FONT_PATH, $flags, [IntPtr]::Zero)
          if ($count -lt 1) {
              $lastError = [Runtime.InteropServices.Marshal]::GetLastWin32Error()
              throw "GDI rejected generated font. Win32 error: $lastError"
          }

          $deviceContext = [InkformFontValidator]::CreateCompatibleDC([IntPtr]::Zero)
          $font = [InkformFontValidator]::CreateFontW(-96, 0, 0, 0, 400, 0, 0, 0, 1, 0, 0, 0, 0, "Inkform")
          if ($deviceContext -eq [IntPtr]::Zero -or $font -eq [IntPtr]::Zero) {
              throw "GDI could not create a font drawing context."
          }

          try {
              [void][InkformFontValidator]::SelectObject($deviceContext, $font)
              foreach ($character in @([uint32][char]'A', [uint32][char]'e')) {
                  $metrics = New-Object InkformFontValidator+GlyphMetrics
                  $result = [InkformFontValidator]::GetGlyphOutlineW($deviceContext, $character, 0, [ref]$metrics, 0, [IntPtr]::Zero, [IntPtr]::Zero)
                  if ($result -eq [uint32]::MaxValue -or $metrics.BlackBoxX -eq 0 -or $metrics.BlackBoxY -eq 0) {
                      throw "GDI could not outline character $([char]$character) from the generated font."
                  }
              }
          } finally {
              [void][InkformFontValidator]::DeleteObject($font)
              [void][InkformFontValidator]::DeleteDC($deviceContext)
              [void][InkformFontValidator]::RemoveFontResourceEx($env:FONT_PATH, $flags, [IntPtr]::Zero)
          }
